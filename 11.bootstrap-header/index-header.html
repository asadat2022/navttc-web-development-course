<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="../00.Data/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <title>Document</title>
</head>

<body class="bg-body">
  <header id="header"class="sticky-top">
    <div class="container">
      <div class="row">
        <div class="col">
          <nav class="navbar navbar-expand-sm navbar-dark">
            <a href="" class="navbar-brand brand-width">
              <img src="../00.Data/logo.png" alt="" class="img-fluid">
            </a>
            <button class="navbar-toggler" data-bs-toggle="offcanvas" data-bs-target="#off-nav">
              <i class="bi bi-justify"></i>
            </button>
            <div class="collapse navbar-collapse" id="nav-item">
              <ul class="navbar-nav">
                <li class="nav-item"><a href="" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="" class="nav-link">About</a></li>
                <li class="nav-item"><a href="" class="nav-link">Contact</a></li>
              </ul>
            </div>
            <div class="offcanvas offcanvas-start bg-dark" id="off-nav">
              <div class="offcanvas-body p-0">
                <div class="list-group">
                  <a href="" class="list-group-item bg-transparent text-white">Home</a>
                  <a href="" class="list-group-item bg-transparent text-white">About</a>
                  <a href="" class="list-group-item bg-transparent text-white">Contact</a>
                </div>
              </div>

            </div>


          </nav>
        </div>
      </div>
    </div>
  </header>

  <script src="../00.Data/bootstrap/js/bootstrap.min.js"></script>
  <script>
    window.onscroll = function () {
      console.log(window.pageYOffset);
      if (window.pageYOffset > 0) {
        document.getElementById('header').classList.add('bg-header');
      } else {
        document.getElementById('header').classList.remove('bg-header');
      }
    }
  </script>
</body>

</html>
